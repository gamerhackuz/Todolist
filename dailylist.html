<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Vazifalar Ro'yxati</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 40px auto; padding: 20px; background: #f4f6f8; }
    h2 { text-align: center; color: #333; }
    .input-box { display: flex; gap: 10px; margin-bottom: 20px; }
    input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
    button { padding: 12px 16px; background: #4CAF50; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #45a049; }
    ul { list-style: none; padding: 0; }
    li { background: #fff; padding: 12px; margin: 6px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    li.done span { text-decoration: line-through; color: #888; }
    .del { background: #e74c3c; padding: 6px 10px; font-size: 13px; }
    .del:hover { background: #c0392b; }
  </style>
</head>
<body>
  <h2>📋 Vazifalar Ro'yxati</h2>
  <div class="input-box">
    <input type="text" id="task" placeholder="Yangi vazifa kiriting...">
    <button onclick="add()">Qo'shish</button>
  </div>
  <ul id="list"></ul>

  <script>
    function add() {
      const input = document.getElementById('task');
      const val = input.value.trim();
      if (!val) return;
      const li = document.createElement('li');
      li.innerHTML = `<span onclick="this.parentElement.classList.toggle('done')">${val}</span><button class="del" onclick="this.parentElement.remove()">✖</button>`;
      document.getElementById('list').appendChild(li);
      input.value = '';
    }
    document.getElementById('task').addEventListener('keypress', e => e.key === 'Enter' && add());
  </script>
</body>
</html>
